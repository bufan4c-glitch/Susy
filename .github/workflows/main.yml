name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # ПОВНИЙ ФІКС ПОМИЛКИ 100:
          # 1. Видаляємо старі списки, які можуть бути битими
          sudo rm -rf /var/lib/apt/lists/*
          # 2. Очищуємо кеш apt
          sudo apt-get clean
          # 3. Пробуємо оновитись 5 разів з паузою 20 секунд
          for i in {1..5}; do 
            sudo apt-get update && break || (echo "Retry $i..." && sleep 20); 
          done
          
          # Встановлення пакетів (додав -qq для меншого спаму в логах)
          sudo apt-get install -y -qq build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-gstreamer-lite0-dev libgstreamer-plugins-base1.0-dev
          
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # Автоматично тиснемо "y" на всі ліцензії Android SDK
          yes | buildozer -v android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoTapper-New-Build
          path: bin/*.apk
          
